repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - -d
          - "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}"

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.13.0
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: jurisdiction-validator
        name: jurisdiction-validator
        language: system
        entry: pwsh -NoProfile -File ./tools-v3/v3-jurisdiction-validator.ps1
        files: ^agents/legal-rules/
