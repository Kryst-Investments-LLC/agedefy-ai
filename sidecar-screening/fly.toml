# Fly.io config — screening/docking sidecar (CPU, scale-to-zero).
# Deploy:  cd sidecar-screening && fly launch --copy-config --no-deploy && fly deploy
app = "agedefy-screening"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # scale to zero when idle → you only pay while docking runs
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

# Docking is CPU-bound; bump cpus/memory if you raise `exhaustiveness`.
[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"
