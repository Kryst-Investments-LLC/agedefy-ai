{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "outbox-dispatch.postgresqlFullname" . }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "outbox-dispatch.postgresqlFullname" . }}
  ports:
    - name: postgres
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgres
{{- end }}