{{- if and .Values.secret.create (not .Values.secret.existingSecret) (not .Values.sealedSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "outbox-dispatch.secretName" . }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "outbox-dispatch.databaseUrl" . | quote }}
  KAFKA_BROKERS: {{ .Values.secret.kafkaBrokers | quote }}
  KAFKA_SASL_USERNAME: {{ .Values.secret.kafkaSaslUsername | quote }}
  KAFKA_SASL_PASSWORD: {{ .Values.secret.kafkaSaslPassword | quote }}
  PUBSUB_PROJECT_ID: {{ .Values.secret.pubsubProjectId | quote }}
{{- end }}