extends: default

rules:
  line-length: disable
  document-start: disable
  truthy: disable
  braces:
    level: warning
    min-spaces-inside: 0
    max-spaces-inside: 2
  brackets:
    level: warning
    min-spaces-inside: 0
    max-spaces-inside: 2
  indentation:
    spaces: consistent
    indent-sequences: consistent
    check-multi-line-strings: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  empty-lines:
    max: 3
  trailing-spaces: disable
  new-line-at-end-of-file: disable
