name: integration-tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    # The Prisma schema targets PostgreSQL, so tests need a real Postgres.
    # SQLite is not a valid substitute: the schema uses Postgres-only types
    # and the persisted-state tests (circuit-breaker, outbox, idempotency,
    # canonical-health-events, etc.) exercise the actual datasource.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agedefy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agedefy_test
      POSTGRES_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agedefy_test
      APP_ENV: test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-development-secret-change-before-production-32c
      MFA_ENCRYPTION_KEY: biozephyra-ci-mfa-encryption-key-material-2026
      ADMIN_EMAILS: admin@example.com
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # Apply the same migration path production uses (single Postgres baseline
      # under prisma/migrations), so CI exercises `migrate deploy` end-to-end.
      - name: Apply migrations to test database
        run: pnpm db:deploy

      - name: Unit + route tests
        run: pnpm test:unit

      - name: Live-server integration tests
        run: pnpm test:integration
