name: publish-image

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.3
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Assert deployment safety flags
        run: pnpm deploy:assert-env
        env:
          APP_ENV: production
          NODE_ENV: production
          RUNTIME_REQUIREMENTS_ENFORCED: "true"
          ENABLE_TEST_AUTH_ENDPOINT: "false"
          DATABASE_URL: postgresql://deployment-assertion.invalid/agedefy
          POSTGRES_DATABASE_URL: postgresql://deployment-assertion.invalid/agedefy
          NEXTAUTH_URL: https://deployment-assertion.invalid
          NEXTAUTH_SECRET: deployment-assertion-nextauth-secret-material
          MFA_ENCRYPTION_KEY: deployment-assertion-mfa-key-material
          SCREENING_ADAPTER_ENCRYPTION_KEY: deployment-assertion-screening-key-material
          CRON_SECRET: deployment-assertion-cron-secret-material
          REDIS_URL: https://deployment-assertion.invalid
          REDIS_TOKEN: deployment-assertion-token
          OTEL_SERVICE_NAME: agedefy
          OTEL_EXPORTER_OTLP_ENDPOINT: https://deployment-assertion.invalid/v1/traces

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            gh_packages_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            PRISMA_RUNTIME=postgres

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
