name: Legal Rules Validation

on:
  push:
    paths:
      - 'agents/**'
      - 'tools/validate-legal-rules.ps1'
  pull_request:
    paths:
      - 'agents/**'
      - 'tools/validate-legal-rules.ps1'

jobs:
  validate-legal-rules:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate legal rules
        shell: pwsh
        run: |
          ./tools/validate-legal-rules.ps1
