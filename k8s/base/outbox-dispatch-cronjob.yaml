apiVersion: v1
kind: ConfigMap
metadata:
  name: biozephyra-outbox-dispatch-config
data:
  OUTBOX_BROKER: kafka
  OUTBOX_BATCH_SIZE: "100"
  OUTBOX_POLL_INTERVAL_MS: "5000"
  OUTBOX_MAX_ATTEMPTS: "5"
  OUTBOX_RETRY_DELAY_MS: "30000"
  OUTBOX_TENANT_ID: ""
  KAFKA_CLIENT_ID: biozephyra-outbox-dispatch-cronjob
  KAFKA_SSL: "true"
  KAFKA_SASL_MECHANISM: plain
  PUBSUB_API_ENDPOINT: ""
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: biozephyra-outbox-dispatch
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: outbox-dispatch
              image: ghcr.io/kryst-investments-llc/finnexusai:main
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - >-
                  pnpm outbox:dispatch -- --batch-size ${OUTBOX_BATCH_SIZE:-100}
                  --max-attempts ${OUTBOX_MAX_ATTEMPTS:-5}
                  --retry-delay-ms ${OUTBOX_RETRY_DELAY_MS:-30000}
                  ${OUTBOX_TENANT_ID:+--tenant ${OUTBOX_TENANT_ID}}
              envFrom:
                - configMapRef:
                    name: biozephyra-outbox-dispatch-config
                - secretRef:
                    name: biozephyra-outbox-dispatch-secrets
              env:
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/secrets/google/service-account.json
              volumeMounts:
                - name: google-application-credentials
                  mountPath: /var/secrets/google
                  readOnly: true
          volumes:
            - name: google-application-credentials
              secret:
                secretName: biozephyra-gcp-service-account
                optional: true