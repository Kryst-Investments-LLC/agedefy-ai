name: causal-inference-agent
version: 0.1.0
role: Performs Mendelian randomization, DAG construction, and confound detection to separate causation from correlation
owners: ["@kryst-investments-llc/research"]
platform_domain: biotech-research
description: |
  Builds directed acyclic graphs from observed exposures, mediators, and
  outcomes, runs Mendelian randomization with GWAS instruments, applies
  back-door / front-door criteria, and reports pleiotropy / weak-instrument /
  collider-bias risks. Emits a calibrated causal effect estimate or refuses
  with a documented identification failure.

capabilities:
  - dag_construction
  - mendelian_randomization
  - instrumental_variable_selection
  - confound_detection
  - collider_bias_check
  - sensitivity_analysis
  - effect_estimate_with_ci
  - identification_failure_reporting

inputs:
  - name: exposure
    description: Exposure variable (gene, biomarker, intervention).
    required: true
    type: string
  - name: outcome
    description: Outcome phenotype (lifespan proxy, disease incidence, biomarker).
    required: true
    type: string
  - name: covariates
    description: Optional set of measured covariates.
    required: false
    type: array
  - name: dataset
    description: GWAS / cohort dataset identifier.
    required: false
    type: string

outputs:
  - name: causal_estimate
    description: Point estimate, 95 percent CI, and p-value for the causal effect.
    type: object
  - name: dag
    description: Serialized DAG with adjustment sets.
    type: object
  - name: sensitivity_report
    description: Pleiotropy, weak-instrument, and collider-bias diagnostics.
    type: object

error_handling:
  on_weak_instruments: "refuse_and_emit_identification_failure"
  on_pleiotropy_detected: "warn_and_run_robust_estimator"
  on_missing_dataset: "reject_with_validation_error"
  retry_policy:
    max_attempts: 2
    backoff_ms: 1000

sla:
  p50_latency_ms: 3000
  p99_latency_ms: 12000
  availability: "99%"

feeds_into:
  - falsification-agent
  - trial-design-agent
  - eval-feedback-agent
  - master-orchestrator-agent

tracing:
  enabled: true
  format: "jsonl"
  fields: [runId, ts, exposure, outcome, estimate, ci_low, ci_high, pleiotropy, latencyMs]
  sink: "./traces/causal-inference-agent.jsonl"

# ---- Tier 1.3 Causal sidecar runtime ----
runtime_backend:
  kind: python_sidecar
  contract_ref: agents/sidecars/causal-sidecar.contract.yml
  libraries: [dowhy, econml, statsmodels]
  default_estimator: backdoor.linear_regression
  fallback_estimator: iv.instrumental_variable
  cohort_sources:
    - id: uk_biobank
      access: credentialed_researcher
      url: "https://www.ukbiobank.ac.uk/enable-your-research/about-our-data"
      fields: [genotype, biomarker_panel_v1, mortality_followup]
    - id: all_of_us
      access: credentialed_researcher
      url: "https://www.researchallofus.org"
      fields: [ehr, wearable_v2, biomarker_v1]
    - id: agedefy_federated_v1
      access: differential_privacy_epsilon_1
      url: "internal://federated/agedefy_v1"
      depends_on_tier: T2.1
  output_format_v2:
    schema_ref: schemas/causal-effect.v2.json
    example: |
      {
        "intervention": "rapamycin_6mg_weekly",
        "outcome": "hs_crp",
        "expected_delta": -0.42,
        "ci95": [-0.60, -0.24],
        "n_similar_profiles": 1247,
        "cohort_source": "agedefy_federated_v1",
        "identification_strategy": "backdoor",
        "model_version": "causal-sidecar@0.1.0",
        "vc_signature_required": true
      }
