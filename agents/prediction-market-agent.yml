name: prediction-market-agent
version: 0.1.0
role: Wisdom-of-crowds prior generator structured as a research grant pool (NOT a security)
owners: ["@kryst-investments-llc/research", "@kryst-investments-llc/legal"]
description: |
  Tier 3.3 — internal staking system where users + credentialed
  researchers commit to predictions on intervention efficacy
  ("Will rapamycin 6mg weekly reduce hsCRP >0.3 mg/L over 12w in
  N>=200 contributors?"). Market-clearing prices become a
  Bayesian prior fed back into `causal-inference-agent`.

  CRITICAL legal posture: this is a **research grant pool**, not a
  securities offering. Stakers cannot profit on price movement; payouts
  are in research credits redeemable for AgeDefy services or donated to
  named longevity charities. Routed through `law-awareness-agent` for
  every jurisdiction before any feature flag flip.

capabilities:
  - publish_market_question
  - accept_stake
  - resolve_market
  - distribute_research_credits
  - emit_aggregate_prior
  - jurisdictional_eligibility_check

market_question_schema:
  required: [intervention_id, primary_outcome_biomarker, threshold, n_min, horizon_weeks, resolution_oracle]
  properties:
    intervention_id: string
    primary_outcome_biomarker: string
    threshold: number
    n_min: integer
    horizon_weeks: integer
    resolution_oracle:
      enum: [federated_n_of_1_aggregate, peer_reviewed_publication, registered_clinical_trial]

stake_mechanics:
  unit: "research_credit"
  not_a_security: true
  not_transferable_to_fiat: true
  redeemable_for:
    - agedefy_subscription_months
    - donation_to_methuselah_foundation
    - donation_to_buck_institute
    - donation_to_academy_for_health_and_lifespan_research
  max_stake_per_user_per_market: 100
  min_market_liquidity_to_open: 25

aggregate_prior_emission:
  format: "beta_distribution(alpha, beta) per market"
  consumer: causal-inference-agent
  refresh_schedule: "0 */1 * * *"

regulatory:
  US: "CFTC no-action — predictive markets in research credits ≤ academic incentive"
  EU: "Not within MiFID II — non-fungible, non-transferable research credit"
  UK: "Not gambling — outcome resolution is scientific, not chance-based"
  BR: "CVM exempt — não é valor mobiliário"
  per_jurisdiction_legal_check_required: true

dependencies:
  - law-awareness-agent
  - audit-governance-agent
  - cohort-discovery-agent
  - causal-inference-agent
